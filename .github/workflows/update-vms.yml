name: Update VMs

on:
  schedule:
    - cron: '0 2 * * 0'   # Every Sunday at 2:00 AM UTC
  workflow_dispatch:
    inputs:
      reboot_if_needed:
        description: 'Reboot VMs if kernel update requires it'
        type: boolean
        default: false

jobs:
  update:
    name: Run OS Updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linode CLI
        run: |
          pip install linode-cli --quiet
          sudo apt-get install -y jq -qq 2>/dev/null || true

      - name: Configure Linode CLI
        run: printf '[DEFAULT]\ntoken = %s\ndefault-user = runner\n' "${{ secrets.LINODE_TOKEN }}" > ~/.config/linode-cli

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Run VM updates
        run: |
          chmod +x scripts/maintenance/update-vms.sh
          ARGS=""
          if [[ "${{ github.event.inputs.reboot_if_needed }}" == "true" ]]; then
            ARGS="--reboot-if-needed"
          fi
          ./scripts/maintenance/update-vms.sh --port 24830 $ARGS

      - name: Upload update report
        uses: actions/upload-artifact@v4
        with:
          name: update-report-${{ github.run_number }}
          path: reports/update-report-*.md
          retention-days: 30
